<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link AI Agency — 3D Logo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-family: Arial, sans-serif; font-size: 12px; color: #999;
      letter-spacing: 1px; text-transform: uppercase; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">Drag to rotate · Scroll to zoom</div>

  <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
    import { FontLoader }     from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry }   from 'three/addons/geometries/TextGeometry.js';

    // ── Renderer ──────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xffffff);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ── Scene / Camera ────────────────────────────────────────────────────
    const scene  = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.3, 10);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.enablePan = false;
    controls.minDistance = 5;
    controls.maxDistance = 18;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;

    // ── Lighting ──────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.6));

    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(4, 8, 6);
    sun.castShadow = true;
    scene.add(sun);

    const rimLight = new THREE.DirectionalLight(0xffffff, 1.0);
    rimLight.position.set(-5, -3, -4);
    scene.add(rimLight);

    // Purple glow — the signature light for the chain link
    const purpleLight = new THREE.PointLight(0x9b6dff, 6, 8);
    purpleLight.position.set(0, 0, 2);
    scene.add(purpleLight);

    const purpleLight2 = new THREE.PointLight(0xb48eff, 3, 10);
    purpleLight2.position.set(0, 1, -1);
    scene.add(purpleLight2);

    // ── Materials ─────────────────────────────────────────────────────────
    const darkMat = new THREE.MeshStandardMaterial({
      color: 0x111111,
      metalness: 0.1,
      roughness: 0.4,
    });

    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xdde0ff,
      metalness: 1.0,
      roughness: 0.05,
      envMapIntensity: 2.0,
    });

    // ── Load font and build scene ─────────────────────────────────────────
    const fontLoader = new FontLoader();
    fontLoader.load(
      'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_bold.typeface.json',
      (font) => {
        const size  = 1.6;
        const depth = 0.3;
        const bevel = { enabled: true, thickness: 0.04, size: 0.02, segments: 4 };

        function makeText(str) {
          return new TextGeometry(str, {
            font, size, height: depth,
            curveSegments: 12,
            bevelEnabled: true,
            bevelThickness: bevel.thickness,
            bevelSize:      bevel.size,
            bevelSegments:  bevel.segments,
          });
        }

        // Measure to center everything
        const group = new THREE.Group();

        // -- "L" --
        const geoL = makeText('L');
        geoL.computeBoundingBox();
        const wL = geoL.boundingBox.max.x - geoL.boundingBox.min.x;
        const meshL = new THREE.Mesh(geoL, darkMat);
        meshL.castShadow = true;
        group.add(meshL);

        // -- "N" --
        const geoN = makeText('N');
        geoN.computeBoundingBox();
        const wN = geoN.boundingBox.max.x - geoN.boundingBox.min.x;

        // -- "K" --
        const geoK = makeText('K');
        geoK.computeBoundingBox();
        const wK = geoK.boundingBox.max.x - geoK.boundingBox.min.x;

        // Chain link width estimate
        const chainW = size * 1.0;
        const gap    = size * 0.06;

        // Total width of "LINK"
        const totalW = wL + gap + chainW + gap + wN + gap + wK;

        // Position each letter
        let xCursor = -totalW / 2;

        meshL.position.set(xCursor, 0, 0);
        xCursor += wL + gap;

        // Chain link at "I" position
        const chainX = xCursor + chainW / 2;
        xCursor += chainW + gap;

        const meshN = new THREE.Mesh(geoN, darkMat);
        meshN.castShadow = true;
        meshN.position.set(xCursor, 0, 0);
        group.add(meshN);
        xCursor += wN + gap;

        const meshK = new THREE.Mesh(geoK, darkMat);
        meshK.castShadow = true;
        meshK.position.set(xCursor, 0, 0);
        group.add(meshK);

        // -- Chain link: two OVAL links that thread through each other --
        const chainGroup = new THREE.Group();

        // Oval curve function (stadium/paperclip shape)
        function ovalCurve(rx, ry, segs = 80) {
          const pts = [];
          for (let i = 0; i <= segs; i++) {
            const t = (i / segs) * Math.PI * 2;
            pts.push(new THREE.Vector3(rx * Math.cos(t), ry * Math.sin(t), 0));
          }
          return new THREE.CatmullRomCurve3(pts, true);
        }

        const lrx  = size * 0.38; // oval long radius
        const lry  = size * 0.22; // oval short radius
        const tubeR = size * 0.065;
        const curve = ovalCurve(lrx, lry);
        const linkGeo = new THREE.TubeGeometry(curve, 80, tubeR, 12, true);

        // Both links tilted ~45° (same diagonal direction as in the logo)
        const tilt = -Math.PI / 4;

        // Link 1 — faces the viewer (in XY plane, tilted -45°)
        const link1 = new THREE.Mesh(linkGeo, chromeMat);
        link1.rotation.z = tilt;
        // Offset toward top-right
        link1.position.set( lry * 0.6,  lry * 0.6, 0.05);
        link1.castShadow = true;
        chainGroup.add(link1);

        // Link 2 — faces sideways (rotated 90° on Y, same tilt), threads through link1
        const link2 = new THREE.Mesh(linkGeo, chromeMat);
        link2.rotation.set(0, Math.PI / 2, tilt); // sideways + same diagonal tilt
        // Offset toward bottom-left
        link2.position.set(-lry * 0.6, -lry * 0.6, 0);
        link2.castShadow = true;
        chainGroup.add(link2);

        chainGroup.position.set(chainX, size * 0.45, 0.1);
        group.add(chainGroup);

        // -- "AI AGENCY" --
        const geoSub = makeText('AI AGENCY');
        geoSub.computeBoundingBox();
        const wSub = geoSub.boundingBox.max.x - geoSub.boundingBox.min.x;
        const meshSub = new THREE.Mesh(geoSub, darkMat);
        meshSub.castShadow = true;

        // Scale sub text to match total width
        const subScale = totalW / wSub * 0.98;
        meshSub.scale.set(subScale, subScale, 1);
        meshSub.position.set(-totalW / 2, -size * 1.18, 0);
        group.add(meshSub);

        // -- Drop shadow plane --
        const shadowPlane = new THREE.Mesh(
          new THREE.PlaneGeometry(totalW * 1.4, 1),
          new THREE.MeshBasicMaterial({ color: 0xdddddd, transparent: true, opacity: 0.5 })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.set(0, -size * 1.5, 0);
        group.add(shadowPlane);

        scene.add(group);

        // ── Animate ───────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        function animate() {
          requestAnimationFrame(animate);
          const t = clock.getElapsedTime();

          controls.update();

          // Float
          group.position.y = Math.sin(t * 0.8) * 0.06;

          // Chain link slow self-spin
          chainGroup.rotation.z = t * 0.5;

          // Purple light pulse
          purpleLight.intensity = 5 + Math.sin(t * 2.0) * 1.5;
          purpleLight.position.x = Math.sin(t * 0.6) * 0.5;
          purpleLight.position.y = Math.cos(t * 0.6) * 0.5 + 0.5;

          renderer.render(scene, camera);
        }
        animate();
      }
    );

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
